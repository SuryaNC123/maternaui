kind = "web"
previewPath = "/"
title = "MaternaCare"
version = "1.0.0"
id = "artifacts/materna-care"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22088

[services.development]
run = "python3 -m http.server 22088 --bind 0.0.0.0 --directory /home/runner/workspace/artifacts/materna-care"

[services.production]
publicDir = "artifacts/materna-care"
serve = "static"

[services.env]
PORT = "22088"
BASE_PATH = "/"
